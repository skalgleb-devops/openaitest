name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/openai-flask:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/openai-flask:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name openai-cluster --region us-east-1

      - name: Create OpenAI K8s Secret
        run: |
          kubectl create secret generic openai-secret             --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}             --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        run: kubectl apply -f deployment.yaml
