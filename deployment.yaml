apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openai-app
  template:
    metadata:
      labels:
        app: openai-app
    spec:
      containers:
      - name: flask-container
        image: <YOUR_DOCKERHUB_USERNAME>/openai-flask:latest
        ports:
        - containerPort: 5000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: OPENAI_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: openai-service
spec:
  type: LoadBalancer
  selector:
    app: openai-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
